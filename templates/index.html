<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CronOS</title>
    <link rel="icon" href="/static/Logo_sin_fondo.png">
    <link href="https://cdn.jsdelivr.net/npm/comic-mono@0.0.1/index.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-color: #0f0f0f; --chat-bg: #1a1a1a; --header-bg: #232323;
            --user-msg: #2b3a42; --cronos-msg: #2a2a2a;
            --core-reposo: #546e7a; --core-escuchar: #3498db; --core-pensar: #2ecc71;
            --core-hablar: #9b59b6; --core-trabajar: #f1c40f;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3a4a52; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--core-escuchar); }

        body { font-family: 'Comic Mono', monospace; background-color: var(--bg-color); color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .chat-container { width: 95%; max-width: 600px; height: 90vh; background: var(--chat-bg); border-radius: 20px; border: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }

        .header { background: var(--header-bg); padding: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 15px; border-bottom: 1px solid #333; position: relative; letter-spacing: 2px; }
        .logo-wrapper { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; }
        .logo-cronos { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); animation: flotar 3s ease-in-out infinite; }
        @keyframes flotar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        .status-dot { width: 14px; height: 14px; border-radius: 50%; transition: 0.3s; position: relative; }
        .status-dot.reposo { background: var(--core-reposo); box-shadow: 0 0 10px var(--core-reposo); }
        .status-dot.pensando { background: var(--core-pensar); }
        .status-dot.pensando::after { content: ''; position: absolute; inset: 0; border-radius: 50%; background: var(--core-pensar); animation: ondas 1.2s infinite; }
        @keyframes ondas { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }

        .status-dot.trabajando { background: var(--core-trabajar); box-shadow: 0 0 15px var(--core-trabajar); border: 2px dashed #000; animation: girar 1s linear infinite; }
        @keyframes girar { 100% { transform: rotate(360deg); } }

        .status-dot.hablando { background: var(--core-hablar); animation: latido 0.4s infinite alternate; }
        @keyframes latido { from { transform: scale(1); } to { transform: scale(1.4); } }
        
        .status-dot.escuchando { background: var(--core-escuchar); box-shadow: 0 0 15px var(--core-escuchar); animation: pulso-mic 0.6s infinite alternate; }
        @keyframes pulso-mic { from { transform: scale(1); opacity: 1; } to { transform: scale(1.4); opacity: 0.6; } }

        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
.mensaje { max-width: 85%; padding: 14px 20px; border-radius: 25px; opacity: 0; transform: translateY(20px); animation: aparecer 0.4s forwards; white-space: pre-wrap; word-wrap: break-word; }        @keyframes aparecer { to { opacity: 1; transform: translateY(0); } }
        .mensaje.usuario { background: var(--user-msg); align-self: flex-end; border-bottom-right-radius: 5px; border: 1px solid #3a4a52; }
        .mensaje.cronos { background: var(--cronos-msg); align-self: flex-start; border-bottom-left-radius: 5px; border: 1px solid #333; }

        .wave-loader { display: flex; gap: 4px; align-items: center; height: 25px; padding: 5px 0; }
        .wave-loader span { width: 4px; height: 12px; background: var(--core-pensar); border-radius: 2px; animation: wave 1s infinite ease-in-out; }
        .wave-loader span:nth-child(1) { animation-delay: 0.1s; }
        .wave-loader span:nth-child(2) { animation-delay: 0.2s; }
        .wave-loader span:nth-child(3) { animation-delay: 0.3s; }
        .wave-loader span:nth-child(4) { animation-delay: 0.4s; }
        .wave-loader span:nth-child(5) { animation-delay: 0.5s; }
        .wave-loader span:nth-child(6) { animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { height: 8px; opacity: 0.5; } 50% { height: 22px; opacity: 1; } }

        .work-loader { display: flex; gap: 6px; align-items: center; height: 25px; }
        .work-loader span { width: 8px; height: 8px; background: var(--core-trabajar); border-radius: 50%; animation: pulse-work 0.6s infinite alternate; }
        .work-loader span:nth-child(2) { animation-delay: 0.2s; }
        .work-loader span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse-work { from { transform: scale(1); opacity: 1; } to { transform: scale(1.5); opacity: 0.3; } }

        .controls { padding: 10px 20px; background: #161616; display: flex; justify-content: flex-end; }
        .selector-modo { background: #222; color: #eee; border: 1px solid #444; padding: 6px 18px; border-radius: 25px; outline: none; font-family: inherit; }

        .input-area { padding: 10px 20px 25px; background: #161616; display: flex; gap: 8px; align-items: center; }
        input[type="text"] { flex: 1; padding: 15px 20px; background: #222; border: 1px solid #333; border-radius: 35px; color: #fff; outline: none; transition: 0.3s;}

        .btn-circular { width: 45px; height: 45px; border-radius: 50%; background: #333; border: 1px solid #444; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; flex-shrink: 0; }
        .btn-circular:hover { background: #444; }
        .btn-circular:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-circular svg { width: 20px; height: 20px; fill: white; }
        
        .btn-mic.activo { background: var(--core-escuchar); box-shadow: 0 0 15px var(--core-escuchar); border-color: var(--core-escuchar); }

        @keyframes alerta-mute {
            0% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(192, 57, 43, 0); }
            100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0); }
        }
        .btn-mute.activo { background: #c0392b !important; border-color: #e74c3c !important; animation: alerta-mute 2s infinite; }

        .equalizer { display: none; height: 20px; gap: 3px; align-items: flex-end; margin-left: 10px; }
        .equalizer.activo { display: flex; }
        .equalizer span { width: 3px; background: var(--core-hablar); border-radius: 2px; animation: eq 0.5s infinite alternate ease-in-out; }
        .equalizer span:nth-child(1) { animation-duration: 0.45s; }
        .equalizer span:nth-child(2) { animation-duration: 0.2s; }
        .equalizer span:nth-child(3) { animation-duration: 0.55s; }
        .equalizer span:nth-child(4) { animation-duration: 0.3s; }
        .equalizer span:nth-child(5) { animation-duration: 0.4s; }
        .equalizer span:nth-child(6) { animation-duration: 0.28s; }
        .equalizer span:nth-child(7) { animation-duration: 0.57s; }
        .equalizer span:nth-child(8) { animation-duration: 0.35s; }
        .equalizer span:nth-child(9) { animation-duration: 0.49s; }
        .equalizer span:nth-child(10) { animation-duration: 0.33s; }
        @keyframes eq { from { height: 4px; } to { height: 22px; } }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div class="logo-wrapper"><img src="/static/Logo_sin_fondo.png" class="logo-cronos"></div>
            <div class="status-dot reposo" id="estado-led"></div>
            <span>CronOS</span>
            <div class="equalizer" id="equalizer">
                <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>
        <div class="chat-box" id="chat-box"><div class="mensaje cronos">CronOS operativo.</div></div>
        <div class="controls"><select id="modo" class="selector-modo"><option value="normal">Normal</option><option value="estudio">Estudio</option><option value="codigo">Código</option></select></div>
        
        <div class="input-area">
            <button class="btn-circular" id="btn-file" onclick="document.getElementById('file').click()"><svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 015 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 005 0V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg></button>
            <input type="file" id="file" hidden onchange="subir(event)">
            
            <button class="btn-circular btn-mute" id="btn-mute" onclick="alternarSilencio()"><svg viewBox="0 0 24 24" id="icon-mute"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
            
            <button class="btn-circular btn-mic" id="btn-mic" onclick="alternarMic()"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
            
            <input type="text" id="msg" placeholder="Escribe aqui..." onkeypress="if(event.key=='Enter')enviar()">
            
            <button class="btn-circular" id="btn-send" onclick="enviar()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
        </div>
    </div>

    <script>
        const chat = document.getElementById("chat-box");
        const input = document.getElementById("msg");
        const led = document.getElementById("estado-led");
        const eq = document.getElementById("equalizer");
        const btnFile = document.getElementById("btn-file");
        const btnMic = document.getElementById("btn-mic");
        const btnSend = document.getElementById("btn-send");
        const btnMute = document.getElementById("btn-mute");
        const iconMute = document.getElementById("icon-mute");
        
        let modoSilencio = false;

        function setStatus(s) { led.className = `status-dot ${s}`; }
        
        function bloquearControles(bloquear) {
            input.disabled = bloquear;
            btnFile.disabled = bloquear;
            btnMic.disabled = bloquear;
            btnSend.disabled = bloquear;
            input.style.opacity = bloquear ? "0.5" : "1";
        }

        async function alternarSilencio() {
            modoSilencio = !modoSilencio;
            if (modoSilencio) {
                iconMute.innerHTML = `<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`;
                btnMute.classList.add("activo");
                try { await fetch('/silenciar_boca', {method: 'POST'}); } catch(e) {}
            } else {
                iconMute.innerHTML = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>`;
                btnMute.classList.remove("activo");
            }
        }

        function typewriter(elemento, texto, i = 0) {
            if (i < texto.length) {
                elemento.textContent += texto.charAt(i);
                chat.scrollTop = chat.scrollHeight;
                setTimeout(() => typewriter(elemento, texto, i + 1), 2);
            }
        }

        async function enviar() {
            const t = input.value.trim(); if(!t) return;
            input.value = "";
            bloquearControles(true); 
            
            const dU = document.createElement("div"); dU.className = "mensaje usuario"; dU.innerText = t; chat.appendChild(dU);
            const dL = document.createElement("div"); dL.className = "mensaje cronos";
            dL.innerHTML = `<div class="wave-loader"><span></span><span></span><span></span><span></span><span></span><span></span></div>`;
            chat.appendChild(dL); setStatus('pensando'); chat.scrollTop = chat.scrollHeight;

            try {
                const r = await fetch('/enviar_mensaje', { 
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body: JSON.stringify({mensaje:t, modo:document.getElementById("modo").value, silencio: modoSilencio})
                });
                const d = await r.json();
                
                if(d.accion) { 
                    dL.innerHTML = `<div class="work-loader"><span></span><span></span><span></span></div>`;
                    setStatus('trabajando'); 
                    await new Promise(res => setTimeout(res, 1500)); 
                }
                
                dL.innerHTML = "";
                typewriter(dL, d.respuesta);
                
                if (!modoSilencio) {
                    setStatus('hablando'); eq.classList.add("activo");
                    let hR = false;
                    const i = setInterval(async ()=>{
                        const rs = await fetch('/estado_boca'); const dt = await rs.json();
                        if(dt.hablando) hR = true;
                        if(!dt.hablando && hR){ 
                            clearInterval(i); 
                            setStatus('reposo'); 
                            eq.classList.remove('activo'); 
                            bloquearControles(false); 
                        }
                    }, 500);
                } else {
                    setStatus('reposo');
                    bloquearControles(false);
                }
            } catch(e) {
                dL.innerText = "Error de conexión neuronal.";
                setStatus('reposo');
                bloquearControles(false);
            }
        }

        async function subir(e) { 
            bloquearControles(true);
            const f = e.target.files[0]; const fd = new FormData(); fd.append('archivo', f);
            setStatus('trabajando'); await fetch('/subir_archivo', {method:'POST', body:fd}); 
            setStatus('reposo'); const dS = document.createElement("div"); dS.className = "mensaje cronos"; dS.innerText = `Archivo ${f.name} procesado exitosamente.`; chat.appendChild(dS);
            bloquearControles(false);
        }

        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(SR) {
            const rec = new SR(); rec.lang = 'es-ES';
            rec.onstart = () => { setStatus('escuchando'); btnMic.classList.add('activo'); bloquearControles(true); btnMic.disabled = false; };
            rec.onresult = (e) => { input.value = e.results[0][0].transcript; enviar(); };
            rec.onend = () => { btnMic.classList.remove('activo'); if(led.classList.contains('escuchando')) { setStatus('reposo'); bloquearControles(false); } };
            function alternarMic() { rec.start(); }
        }
    </script>
</body>
</html>
